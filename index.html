<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable Body Measurement</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
video{display:none;}
canvas{
  width:95vw;
  max-width:480px;
  margin-top:20px;
  border:2px solid #00e676;
  border-radius:12px;
}
button{
  margin:10px;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#00e676;
  font-weight:bold;
}
#countdown{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:80px;
  color:#00e676;
}
.wrapper{
  position:relative;
  display:inline-block;
}
</style>
</head>
<body>

<h2>📏 Stable Body Measurement</h2>
<button onclick="start()">카메라 시작</button>
<button onclick="downloadCSV()">CSV 다운로드</button>

<div class="wrapper">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="countdown"></div>
</div>

<div id="result"></div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const countdownEl=document.getElementById("countdown");

let camera=null;
let prevLandmarks=null;
let stableStart=null;
let countdownStart=null;
let captured=false;
let resultData=[];

const pose=new Pose({
  locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
  modelComplexity:1,
  smoothLandmarks:true,
  minDetectionConfidence:0.5,
  minTrackingConfidence:0.5
});

pose.onResults(results=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(results.image,0,0,canvas.width,canvas.height);

  if(!results.poseLandmarks) return;

  const lm=results.poseLandmarks;

  let diff=999;
  if(prevLandmarks){
    diff=lm.reduce((sum,p,i)=>
      sum+Math.abs(p.x-prevLandmarks[i].x)+Math.abs(p.y-prevLandmarks[i].y),0);
  }

  if(diff<0.01){
    if(!stableStart) stableStart=Date.now();

    if(Date.now()-stableStart>2000){
      if(!countdownStart) countdownStart=Date.now();

      let remain=5-Math.floor((Date.now()-countdownStart)/1000);
      countdownEl.innerText=remain>0?remain:"";

      if(remain<=0 && !captured){
        captured=true;

        const w=canvas.width;
        const h=canvas.height;

        const shoulder=dist(lm[11],lm[12],w,h);
        const hip=dist(lm[23],lm[24],w,h);
        const ankleY=((lm[27].y+lm[28].y)/2)*h;
        const height=Math.abs((lm[0].y*h)-ankleY);

        const chestLeft={
          x:(lm[11].x+lm[23].x)/2,
          y:(lm[11].y+lm[23].y)/2
        };
        const chestRight={
          x:(lm[12].x+lm[24].x)/2,
          y:(lm[12].y+lm[24].y)/2
        };
        const chest=dist(chestLeft,chestRight,w,h);

        const hv=height.toFixed(1);
        const sv=shoulder.toFixed(1);
        const pv=hip.toFixed(1);
        const cv=chest.toFixed(1);

        document.getElementById("result").innerHTML=
          `신장: ${hv}px<br>
           어깨: ${sv}px<br>
           골반: ${pv}px<br>
           가슴: ${cv}px`;

        resultData.push([hv,sv,pv,cv]);
      }
    }
  }else{
    stableStart=null;
    countdownStart=null;
    countdownEl.innerText="";
  }

  prevLandmarks=lm;
});

function dist(p1,p2,w,h){
  return Math.sqrt(
    Math.pow((p1.x*w-p2.x*w),2)+
    Math.pow((p1.y*h-p2.y*h),2)
  );
}

async function start(){
  if(location.protocol!=="https:" && location.hostname!=="localhost"){
    alert("HTTPS 환경에서 실행하세요 (GitHub Pages 사용)");
    return;
  }

  captured=false;
  stableStart=null;
  countdownStart=null;
  prevLandmarks=null;

  camera=new Camera(video,{
    onFrame: async ()=>{
      await pose.send({image:video});
    },
    width:720,
    height:1280,
    facingMode:"environment"
  });

  await camera.start();

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
}

function downloadCSV(){
  if(resultData.length===0){
    alert("저장된 데이터 없음");
    return;
  }

  let csv="신장(px),어깨(px),골반(px),가슴(px)\n";
  resultData.forEach(r=>csv+=r.join(",")+"\n");

  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="body_measurements.csv";
  a.click();
}
</script>

</body>
</html>
