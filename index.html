<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Capture Body Measurement</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body { text-align:center; background:#111; color:white; font-family:sans-serif; }
canvas { border:2px solid #00ffcc; }
#countdown {
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:100px;
  color:red;
}
#result { margin-top:20px; font-size:20px; }
select, button { padding:8px; margin:10px; }
</style>
</head>
<body>

<h2>📏 Auto Capture Body Measurement</h2>

<select id="cameraSelect"></select>
<button onclick="startCamera()">카메라 시작</button>
<button onclick="resetCapture()">재측정</button>

<div style="position:relative; display:inline-block;">
<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas" width="640" height="720"></canvas>
<div id="countdown"></div>
</div>

<div id="result"></div>
<button onclick="downloadCSV()">CSV 다운로드</button>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const cameraSelect = document.getElementById("cameraSelect");

let stream;
let prevLandmarks = null;
let stableStart = null;
let countdownStart = null;
let captured = false;
let resultData = [];

function calculateDistance(p1, p2, w, h){
  return Math.sqrt(
    Math.pow((p1.x*w - p2.x*w),2) +
    Math.pow((p1.y*h - p2.y*h),2)
  );
}

async function getCameras(){
  const devices = await navigator.mediaDevices.enumerateDevices();
  const cams = devices.filter(d => d.kind === "videoinput");
  cameraSelect.innerHTML = "";
  cams.forEach((cam,i)=>{
    const option = document.createElement("option");
    option.value = cam.deviceId;
    option.text = cam.label || `Camera ${i+1}`;
    cameraSelect.appendChild(option);
  });
}

async function startCamera(){
  if(stream){
    stream.getTracks().forEach(track=>track.stop());
  }

  stream = await navigator.mediaDevices.getUserMedia({
    video:{ deviceId:{ exact:cameraSelect.value } }
  });

  video.srcObject = stream;
}

function resetCapture(){
  captured=false;
  stableStart=null;
  countdownStart=null;
  prevLandmarks=null;
  document.getElementById("countdown").innerText="";
  document.getElementById("result").innerHTML="";
}

const pose = new Pose({
  locateFile:(file)=>
    `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
  modelComplexity:1,
  smoothLandmarks:true,
  minDetectionConfidence:0.5,
  minTrackingConfidence:0.5
});

pose.onResults(results=>{

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  // 🔵 가이드라인 박스 (Python과 동일 비율)
  ctx.strokeStyle="blue";
  ctx.lineWidth=3;
  ctx.strokeRect(
    canvas.width*0.3,
    canvas.height*0.1,
    canvas.width*0.4,
    canvas.height*0.85
  );

  if(results.poseLandmarks){

    drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS);
    drawLandmarks(ctx, results.poseLandmarks);

    const landmarks = results.poseLandmarks;

    let diff = 999;
    if(prevLandmarks){
      diff = landmarks.reduce((sum,p,i)=>
        sum + Math.abs(p.x-prevLandmarks[i].x)
            + Math.abs(p.y-prevLandmarks[i].y),0);
    }

    if(diff < 0.01){

      if(!stableStart) stableStart = Date.now();

      if(Date.now()-stableStart > 2000){

        if(!countdownStart) countdownStart=Date.now();

        let remaining = 5 - Math.floor((Date.now()-countdownStart)/1000);
        document.getElementById("countdown").innerText =
          remaining>0 ? remaining : "";

        if(remaining<=0 && !captured){

          captured=true;

          const w=canvas.width;
          const h=canvas.height;

          const shoulder = calculateDistance(landmarks[11],landmarks[12],w,h);
          const hip = calculateDistance(landmarks[23],landmarks[24],w,h);
          const ankleY=((landmarks[27].y+landmarks[28].y)/2)*h;
          const height=Math.abs((landmarks[0].y*h)-ankleY);

          document.getElementById("result").innerHTML=
            `📏 신장(px): ${height.toFixed(2)}<br>
             📐 어깨(px): ${shoulder.toFixed(2)}<br>
             🦴 골반(px): ${hip.toFixed(2)}`;

          resultData.push([
            height.toFixed(2),
            shoulder.toFixed(2),
            hip.toFixed(2)
          ]);
        }
      }
    }else{
      stableStart=null;
      countdownStart=null;
      document.getElementById("countdown").innerText="";
    }

    prevLandmarks=landmarks;
  }

  requestAnimationFrame(processFrame);
});

async function processFrame(){
  await pose.send({image:video});
}

video.addEventListener("loadeddata",()=>processFrame());

function downloadCSV(){
  let csv="신장(px),어깨(px),골반(px)\n";
  resultData.forEach(row=>csv+=row.join(",")+"\n");
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="body_measurements.csv";
  a.click();
}

getCameras();
</script>

</body>
</html>
